{% extends "base.html" %}
{% set hide_sidebar = True %}

{% block title %}Contact Us — BookMyShoot{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
  <div class="col-lg-8">
    <div class="card p-5 shadow-sm">
      <div class="text-center mb-5">
        <h2 class="fw-bold">Let's Talk</h2>
        <p class="text-muted">Have questions? We'd love to hear from you!</p>
      </div>

      <form id="contactForm">
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <label class="form-label small fw-bold text-uppercase text-muted">First Name</label>
            <input type="text" class="form-control rounded-3 border-0 bg-light py-3" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold text-uppercase text-muted">Last Name</label>
            <input type="text" class="form-control rounded-3 border-0 bg-light py-3" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase text-muted">Email Address</label>
          <input type="email" class="form-control rounded-3 border-0 bg-light py-3" required>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase text-muted">Subject</label>
          <input type="text" class="form-control rounded-3 border-0 bg-light py-3">
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase text-muted">Message</label>
          <textarea class="form-control rounded-3 border-0 bg-light py-3" rows="5"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm">Send Message</button>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById('contactForm')?.addEventListener('submit', function (e) {
    e.preventDefault();
    Swal.fire({
      icon: 'success',
      title: 'Message Sent!',
      text: 'Thank you for reaching out. We will get back to you soon.',
      confirmButtonColor: '#4f46e5'
    });
    this.reset();
  });
</script>
{% endblock %}
