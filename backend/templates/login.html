{% extends "base.html" %}
{% set hide_sidebar = True %}
{% block title %}Login — BookMyShoot{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 animate__animated animate__fadeIn">
    <div class="col-md-5 col-lg-4">
        <div class="card p-5 shadow-sm">
            <div class="text-center mb-5">
                <div class="fs-1 mb-3">📸</div>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Login to manage your bookings</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-lg rounded-3 bg-light border-0"
                        placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small fw-bold text-uppercase text-muted">Password</label>
                        <a href="#" class="small text-decoration-none">Forgot?</a>
                    </div>
                    <input type="password" name="password"
                        class="form-control form-control-lg rounded-3 bg-light border-0" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-4">Login to
                    Dashboard</button>

                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}"
                            class="fw-bold text-decoration-none">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .min-vh-75 {
        min-height: 75vh;
    }
</style>
{% endblock %}
