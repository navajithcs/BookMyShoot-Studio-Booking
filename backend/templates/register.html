{% extends "base.html" %}
{% set hide_sidebar = True %}
{% block title %}Sign Up — BookMyShoot{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 animate__animated animate__fadeIn">
    <div class="col-md-6 col-lg-5">
        <div class="card p-5 shadow-sm">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Choose your role and start your journey</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-uppercase text-muted">First Name</label>
                        <input type="text" name="first_name" class="form-control rounded-3 border-0 bg-light" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-uppercase text-muted">Last Name</label>
                        <input type="text" name="last_name" class="form-control rounded-3 border-0 bg-light" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Join As</label>
                    <select name="user_type" class="form-select rounded-3 border-0 bg-light">
                        <option value="customer">I want to book a photographer (Customer)</option>
                        <option value="photographer">I am a professional photographer</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Email Address</label>
                    <input type="email" name="email" class="form-control rounded-3 border-0 bg-light" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Password</label>
                    <input type="password" name="password" class="form-control rounded-3 border-0 bg-light" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-4">Create My
                    Account</button>

                <div class="text-center">
                    <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}"
                            class="fw-bold text-decoration-none">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
