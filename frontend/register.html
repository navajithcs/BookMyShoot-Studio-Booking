  <style>

      background: white;
      pointer-events: none;

      top: -120px; left: -120px;
      animation: floatShape 9s ease-in-out infinite;
    }
    .bg-shape-2 {
      width: 350px; height: 350px;
      bottom: -100px; right: -100px;
      animation: floatShape 11s ease-in-out infinite reverse;
    }
    .bg-shape-3 {
      width: 180px; height: 180px;
      top: 40%; right: 8%;
      animation: floatShape 13s ease-in-out infinite 2s;
    }

      width: 130px; height: 130px;
      top: 15%; left: 20%;
      animation: floatShape 10s ease-in-out infinite 1s;

      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -30px) scale(1.05); }
      50% { transform: translate(-15px, 20px) scale(0.95); }
      75% { transform: translate(25px, 10px) scale(1.03); }

      width: 6px; height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }

  <script>
    // Generate floating particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 5 + 3) + 'px';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
      }
    })();

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    // --- Validation Helpers ---
    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    function validatePhone(phone) {
      return /^[\d\s\-\+\(\)]{7,15}$/.test(phone);
    }

    function setFieldState(groupId, msgId, statusId, state, message) {
      const group = document.getElementById(groupId);
      const msg = document.getElementById(msgId);
      const status = statusId ? document.getElementById(statusId) : null;
      group.classList.remove('valid', 'invalid');
      msg.classList.remove('error', 'success');
      msg.textContent = '';
      if (status) status.textContent = '';

      if (state === 'valid') {
        group.classList.add('valid');
        if (message) { msg.classList.add('success'); msg.textContent = message; }
        if (status) status.textContent = '✓';
      } else if (state === 'invalid') {
        group.classList.add('invalid');
        msg.classList.add('error');
        msg.textContent = message;
        if (status) status.textContent = '✗';
      }
    }

    // --- Password Strength ---
    function getPasswordStrength(pw) {
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return Math.min(score, 4);
    }

    function updateStrengthMeter(pw) {
      const strength = getPasswordStrength(pw);
      const colors = ['', 'weak', 'weak', 'medium', 'strong'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const labelColors = ['', '#ef4444', '#f59e0b', '#f59e0b', '#10b981'];
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('str' + i);
        bar.className = 'strength-bar';
        if (i <= strength) bar.classList.add(colors[strength]);
      }
      const text = document.getElementById('strengthText');
      if (pw.length > 0) {
        text.textContent = labels[strength] || '';
        text.style.color = labelColors[strength] || '#888';
      } else {
        text.textContent = '';
      }
    }

    // --- Real-time validation ---
    const fnameInput = document.getElementById('fnameInput');
    const lnameInput = document.getElementById('lnameInput');
    const emailInput = document.getElementById('emailInput');
    const phoneInput = document.getElementById('phoneInput');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');

    fnameInput.addEventListener('input', function() {
      const v = this.value.trim();
      if (!v) setFieldState('fnameGroup', 'fnameMsg', 'fnameStatus', '', '');
      else if (v.length < 2) setFieldState('fnameGroup', 'fnameMsg', 'fnameStatus', 'invalid', 'At least 2 characters');
      else setFieldState('fnameGroup', 'fnameMsg', 'fnameStatus', 'valid', '');
    });

    lnameInput.addEventListener('input', function() {
      const v = this.value.trim();
      if (!v) setFieldState('lnameGroup', 'lnameMsg', 'lnameStatus', '', '');
      else if (v.length < 2) setFieldState('lnameGroup', 'lnameMsg', 'lnameStatus', 'invalid', 'At least 2 characters');
      else setFieldState('lnameGroup', 'lnameMsg', 'lnameStatus', 'valid', '');
    });

    emailInput.addEventListener('input', function() {
      const v = this.value.trim();
      if (!v) setFieldState('emailGroup', 'emailMsg', 'emailStatus', '', '');
      else if (!validateEmail(v)) setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Please enter a valid email (e.g., name@example.com)');
      else setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'valid', 'Email looks good!');
    });

    phoneInput.addEventListener('input', function() {
      const v = this.value.trim();
      if (!v) setFieldState('phoneGroup', 'phoneMsg', 'phoneStatus', '', '');
      else if (!validatePhone(v)) setFieldState('phoneGroup', 'phoneMsg', 'phoneStatus', 'invalid', 'Enter a valid phone number');
      else setFieldState('phoneGroup', 'phoneMsg', 'phoneStatus', 'valid', '');
    });

    passwordInput.addEventListener('input', function() {
      const v = this.value;
      updateStrengthMeter(v);
      if (!v) setFieldState('passwordGroup', 'passwordMsg', null, '', '');
      else if (v.length < 6) setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Min 6 characters');
      else if (getPasswordStrength(v) < 2) setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Too weak — add uppercase, numbers, or symbols');
      else setFieldState('passwordGroup', 'passwordMsg', null, 'valid', '');
      // Re-check confirm
      if (confirmInput.value) confirmInput.dispatchEvent(new Event('input'));
    });

    confirmInput.addEventListener('input', function() {
      const v = this.value;
      if (!v) setFieldState('confirmGroup', 'confirmMsg', null, '', '');
      else if (v !== passwordInput.value) setFieldState('confirmGroup', 'confirmMsg', null, 'invalid', 'Passwords do not match');
      else setFieldState('confirmGroup', 'confirmMsg', null, 'valid', 'Passwords match!');
    });

    // --- Form Submit ---
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const firstName = fnameInput.value.trim();
      const lastName = lnameInput.value.trim();
      const email = emailInput.value.trim();
      const phone = phoneInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;
      const userType = 'customer';
      const terms = document.getElementById('termsCheck').checked;
      const formError = document.getElementById('formError');

      formError.style.display = 'none';

      // Validate all fields
      let hasError = false;
      if (!firstName || firstName.length < 2) {
        setFieldState('fnameGroup', 'fnameMsg', 'fnameStatus', 'invalid', 'First name is required');
        hasError = true;
      }
      if (!lastName || lastName.length < 2) {
        setFieldState('lnameGroup', 'lnameMsg', 'lnameStatus', 'invalid', 'Last name is required');
        hasError = true;
      }
      if (!email) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Email is required');
        hasError = true;
      } else if (!validateEmail(email)) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Please enter a valid email address');
        hasError = true;
      }
      if (!phone) {
        setFieldState('phoneGroup', 'phoneMsg', 'phoneStatus', 'invalid', 'Phone number is required');
        hasError = true;
      } else if (!validatePhone(phone)) {
        setFieldState('phoneGroup', 'phoneMsg', 'phoneStatus', 'invalid', 'Enter a valid phone number');
        hasError = true;
      }
      if (!password) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Password is required');
        hasError = true;
      } else if (password.length < 6) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Min 6 characters required');
        hasError = true;
      } else if (getPasswordStrength(password) < 2) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Password is too weak');
        hasError = true;
      }
      if (!confirmPassword) {
        setFieldState('confirmGroup', 'confirmMsg', null, 'invalid', 'Please confirm your password');
        hasError = true;
      } else if (password !== confirmPassword) {
        setFieldState('confirmGroup', 'confirmMsg', null, 'invalid', 'Passwords do not match');
        hasError = true;
      }
      if (!terms) {
        formError.textContent = 'You must agree to the Terms of Service';
        formError.style.display = 'block';
        hasError = true;
      }
      if (hasError) return;

      // Submit
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="btn-loader"></span> Creating Account...';

      fetch('http://localhost:5000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: firstName,
          last_name: lastName,
          email: email,
          user_type: userType,
          password: password,
          phone: phone
        }),
        mode: 'cors'
      })
        .then(response => {
          if (!response.ok) {
            return response.json().then(errData => {
              throw new Error(errData.error || 'Registration failed');
            });
          }
          return response.json();
        })
        .then(data => {
          if (data.error) {
            formError.textContent = data.error;
            formError.style.display = 'block';
            return;
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          showModal('Success', 'Registration successful! Please login with your credentials.', () => {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
          });
        })
        .catch(error => {
          console.error('Registration error:', error);
          formError.textContent = error.message || 'Registration failed. Make sure the server is running.';
          formError.style.display = 'block';
        })
        .finally(() => {
          submitBtn.textContent = 'Create Account';
          submitBtn.disabled = false;
        });
    });
  </script>

</body>

</html>
