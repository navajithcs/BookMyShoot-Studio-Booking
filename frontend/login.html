<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BookMyShoot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/modal.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', 'Inter', sans-serif;
    }

    /* Animated background shapes */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.07;
      background: white;
      pointer-events: none;
    }
    .bg-shape-1 {
      width: 400px; height: 400px;
      top: -100px; right: -100px;
      animation: floatShape 8s ease-in-out infinite;
    }
    .bg-shape-2 {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      animation: floatShape 10s ease-in-out infinite reverse;
    }
    .bg-shape-3 {
      width: 200px; height: 200px;
      top: 50%; left: 10%;
      animation: floatShape 12s ease-in-out infinite 2s;
    }
    .bg-shape-4 {
      width: 150px; height: 150px;
      bottom: 20%; right: 15%;
      animation: floatShape 9s ease-in-out infinite 1s;
    }

    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -30px) scale(1.05); }
      50% { transform: translate(-15px, 20px) scale(0.95); }
      75% { transform: translate(25px, 10px) scale(1.03); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .auth-card {
      position: relative;
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 50px 44px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.1);
      animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
    }

    @keyframes cardEntrance {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 28px;
      transition: all 0.3s;
      font-weight: 500;
      animation: fadeSlideRight 0.6s ease-out 0.3s backwards;
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .auth-back:hover { color: #667eea; transform: translateX(-3px); }

    .auth-logo {
      text-align: center;
      margin-bottom: 8px;
      animation: fadeSlideDown 0.6s ease-out 0.2s backwards;
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-logo .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35); }
      50% { box-shadow: 0 12px 36px rgba(102, 126, 234, 0.5); }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeSlideDown 0.6s ease-out 0.35s backwards;
    }
    .auth-header h1 {
      font-size: 2em;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .auth-header p {
      font-size: 0.95em;
      color: #888;
    }

    /* Form Styles */
    .auth-form { display: grid; gap: 20px; }

    .input-group {
      position: relative;
      animation: fadeSlideUp 0.5s ease-out backwards;
    }
    .input-group:nth-child(1) { animation-delay: 0.4s; }
    .input-group:nth-child(2) { animation-delay: 0.5s; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group .input-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: #b0b0b0;
      font-size: 18px;
      transition: color 0.3s;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 16px 48px 16px 48px;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: #fafbfc;
      color: #1a1a1a;
    }
    .input-group input::placeholder { color: #b0b0b0; }
    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    .input-group input:focus ~ .input-icon { color: #667eea; }

    /* Validation states */
    .input-group.valid input {
      border-color: #10b981;
      background: #f0fdf4;
    }
    .input-group.valid .input-icon { color: #10b981; }
    .input-group.valid input:focus {
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .input-group.invalid input {
      border-color: #ef4444;
      background: #fef2f2;
    }
    .input-group.invalid .input-icon { color: #ef4444; }
    .input-group.invalid input:focus {
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .validation-msg {
      font-size: 12px;
      margin-top: 6px;
      padding-left: 4px;
      display: none;
      animation: fadeSlideUp 0.3s ease;
    }
    .validation-msg.error { color: #ef4444; display: block; }
    .validation-msg.success { color: #10b981; display: block; }

    .input-group .status-icon {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .input-group.valid .status-icon {
      opacity: 1;
      color: #10b981;
      animation: popIn 0.3s ease;
    }
    .input-group.invalid .status-icon {
      opacity: 1;
      color: #ef4444;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      0% { transform: translateY(-50%) scale(0); }
      70% { transform: translateY(-50%) scale(1.2); }
      100% { transform: translateY(-50%) scale(1); }
    }

    .toggle-password {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #b0b0b0;
      font-size: 18px; padding: 0;
      display: flex; align-items: center;
      transition: color 0.3s;
      z-index: 2;
    }
    .toggle-password:hover { color: #667eea; }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      animation: fadeSlideUp 0.5s ease-out 0.6s backwards;
    }
    .checkbox-label {
      display: flex; align-items: center;
      cursor: pointer; color: #666; font-size: 13px;
    }
    .checkbox-label input[type="checkbox"] {
      margin-right: 8px; width: 16px; height: 16px;
      cursor: pointer; accent-color: #667eea;
    }
    .forgot-link {
      color: #667eea; text-decoration: none;
      font-size: 13px; font-weight: 600;
      transition: all 0.3s;
    }
    .forgot-link:hover { text-decoration: underline; color: #764ba2; }

    .auth-submit {
      margin-top: 4px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 100%;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
      animation: fadeSlideUp 0.5s ease-out 0.7s backwards;
    }
    .auth-submit::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.6s;
    }
    .auth-submit:hover::before { left: 100%; }
    .auth-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
    }
    .auth-submit:active {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
    }
    .auth-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }
    .auth-submit .btn-loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .auth-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 4px 0; color: #ccc; font-size: 13px;
      animation: fadeSlideUp 0.5s ease-out 0.75s backwards;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e5e5;
    }

    .auth-footer {
      margin-top: 28px;
      text-align: center;
      animation: fadeSlideUp 0.5s ease-out 0.8s backwards;
    }
    .auth-footer p {
      font-size: 14px;
      color: #888;
    }
    .auth-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s;
    }
    .auth-footer a:hover { color: #764ba2; text-decoration: underline; }

    /* Password strength */
    .password-strength {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-bar {
      flex: 1; height: 4px;
      background: #e5e5e5;
      border-radius: 4px;
      transition: all 0.3s;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; border-radius: 22px; }
      .auth-header h1 { font-size: 1.6em; }
    }
  </style>
</head>

<body>

  <div class="auth-page">
    <!-- Animated background -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
    <div class="bg-shape bg-shape-4"></div>
    <div class="particles" id="particles"></div>

    <div class="auth-card">
      <a href="index.html" class="auth-back">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>

      <div class="auth-logo">
        <div class="logo-icon">📷</div>
      </div>

      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to your account</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <!-- Email -->
        <div>
          <div class="input-group" id="emailGroup">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" name="email" id="emailInput" placeholder="Email address" required autocomplete="email">
            <span class="status-icon" id="emailStatus"></span>
          </div>
          <div class="validation-msg" id="emailMsg"></div>
        </div>

        <!-- Password -->
        <div>
          <div class="input-group" id="passwordGroup">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" name="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="validation-msg" id="passwordMsg"></div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/modal.js"></script>
  <script>
    // Generate floating particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 5 + 3) + 'px';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
      }
    })();

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    // --- Validation ---
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('password');

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setFieldState(groupId, msgId, statusId, state, message) {
      const group = document.getElementById(groupId);
      const msg = document.getElementById(msgId);
      const status = document.getElementById(statusId);
      group.classList.remove('valid', 'invalid');
      msg.classList.remove('error', 'success');
      msg.textContent = '';
      if (status) status.textContent = '';

      if (state === 'valid') {
        group.classList.add('valid');
        msg.classList.add('success');
        msg.textContent = message;
        if (status) status.textContent = '✓';
      } else if (state === 'invalid') {
        group.classList.add('invalid');
        msg.classList.add('error');
        msg.textContent = message;
        if (status) status.textContent = '✗';
      }
    }

    emailInput.addEventListener('input', function() {
      const val = this.value.trim();
      if (!val) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', '', '');
      } else if (!validateEmail(val)) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Please enter a valid email address');
      } else {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'valid', 'Email looks good!');
      }
    });

    passwordInput.addEventListener('input', function() {
      const val = this.value;
      if (!val) {
        setFieldState('passwordGroup', 'passwordMsg', null, '', '');
      } else if (val.length < 6) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Password must be at least 6 characters');
      } else {
        setFieldState('passwordGroup', 'passwordMsg', null, 'valid', '');
      }
    });

    // Redirect if already logged in
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (user) {
      if (user.user_type === 'photographer') {
        window.location.href = 'photographer-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validate before submit
      let hasError = false;
      if (!email) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Email is required');
        hasError = true;
      } else if (!validateEmail(email)) {
        setFieldState('emailGroup', 'emailMsg', 'emailStatus', 'invalid', 'Please enter a valid email address');
        hasError = true;
      }
      if (!password) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Password is required');
        hasError = true;
      } else if (password.length < 6) {
        setFieldState('passwordGroup', 'passwordMsg', null, 'invalid', 'Password must be at least 6 characters');
        hasError = true;
      }
      if (hasError) return;

      // Disable button with loader
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="btn-loader"></span> Signing in...';

      fetch('http://localhost:5000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        mode: 'cors'
      })
        .then(response => {
          if (!response.ok) {
            return response.json().then(errData => {
              throw new Error(errData.error || 'Login failed');
            }).catch(parseErr => {
              if (parseErr.message && !parseErr.message.includes('status')) throw parseErr;
              throw new Error('Server error. Please try again.');
            });
          }
          return response.json();
        })
        .then(data => {
          if (data.error) {
            showModal('Error', data.error);
            return;
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          showModal('Success', 'Welcome back, ' + data.user.first_name + '!', () => {
            if (data.user.user_type === 'photographer') {
              window.location.href = 'photographer-dashboard.html';
            } else if (data.user.user_type === 'admin') {
              window.location.href = 'admin-dashboard.html';
            } else {
              window.location.href = 'index.html';
            }
          });
        })
        .catch(error => {
          console.error('Login error:', error);
          showModal('Error', error.message || 'Could not connect to server. Make sure the backend is running.');
        })
        .finally(() => {
          submitBtn.textContent = 'Sign In';
          submitBtn.disabled = false;
        });
    });
  </script>
</body>

</html>
