<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Processing - BookMyShoot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .refund-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .refund-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .refund-icon i {
            font-size: 48px;
            color: #f59e0b;
        }
        .refund-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .refund-subtitle {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .refund-amount {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid #86efac;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .refund-amount-label {
            font-size: 0.875rem;
            color: #059669;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .refund-amount-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #059669;
        }
        .refund-method {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #374151;
            margin-bottom: 32px;
        }
        .refund-method i {
            color: #667eea;
        }
        .progress-container {
            background: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .progress-bar-custom {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .progress-text {
            font-size: 0.875rem;
            color: #6b7280;
        }
        .status-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
        }
        .status-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: #e5e7eb;
            z-index: 0;
        }
        .status-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }
        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .step-icon.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .step-icon.completed {
            background: #10b981;
            color: white;
        }
        .step-icon i {
            font-size: 18px;
        }
        .step-label {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
        }
        .step-label.active {
            color: #667eea;
            font-weight: 600;
        }
        .customer-info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .customer-info h6 {
            font-size: 0.8rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .customer-info p {
            font-size: 0.95rem;
            color: #1f2937;
            margin: 0;
        }
        .booking-details {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .booking-details:last-child {
            border-bottom: none;
        }
        .booking-details span:first-child {
            color: #6b7280;
            font-size: 0.9rem;
        }
        .booking-details span:last-child {
            color: #1f2937;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="refund-card">
        <div class="refund-icon">
            <i class="bi bi-arrow-left-right"></i>
        </div>
        
        <h1 class="refund-title">Refund Processing</h1>
        <p class="refund-subtitle">
            Your refund is being processed. The amount will be credited to the customer's original payment method.
        </p>
        
        <div class="refund-amount">
            <div class="refund-amount-label">Refund Amount</div>
            <div class="refund-amount-value" id="refundAmount">₹0</div>
        </div>
        
        <div class="refund-method">
            <i class="bi bi-credit-card"></i>
            <span>via <span id="refundMethod">Razorpay</span></span>
        </div>
        
        <div class="status-steps">
            <div class="status-step">
                <div class="step-icon completed" id="step1">
                    <i class="bi bi-check"></i>
                </div>
                <span class="step-label active">Cancelled</span>
            </div>
            <div class="status-step">
                <div class="step-icon active" id="step2">
                    <i class="bi bi-arrow-repeat"></i>
                </div>
                <span class="step-label active">Processing</span>
            </div>
            <div class="status-step">
                <div class="step-icon" id="step3">
                    <i class="bi bi-check-circle"></i>
                </div>
                <span class="step-label">Completed</span>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar-custom"></div>
        </div>
        <p class="progress-text">Processing refund to customer...</p>
        
        <div class="customer-info" id="customerInfo" style="display: none;">
            <h6>Customer Details</h6>
            <p id="customerName"></p>
        </div>
        
        <div id="bookingInfo" style="display: none;">
            <div class="booking-details">
                <span>Booking ID</span>
                <span id="bookingId"></span>
            </div>
            <div class="booking-details">
                <span>Service</span>
                <span id="serviceName"></span>
            </div>
            <div class="booking-details">
                <span>Event Date</span>
                <span id="eventDate"></span>
            </div>
        </div>
    </div>
    
    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('booking_id');
        const amount = urlParams.get('amount');
        const method = urlParams.get('method') || 'Razorpay';
        const customerName = urlParams.get('customer') || 'Customer';
        const serviceName = urlParams.get('service') || 'Photography Service';
        const eventDate = urlParams.get('event_date') || 'N/A';
        
        // Set values
        document.getElementById('refundAmount').textContent = '₹' + parseInt(amount || 0).toLocaleString('en-IN');
        document.getElementById('refundMethod').textContent = method;
        document.getElementById('bookingId').textContent = '#BMS-' + String(bookingId || '0000').padStart(4, '0');
        document.getElementById('serviceName').textContent = serviceName;
        document.getElementById('eventDate').textContent = eventDate;
        
        if (customerName && customerName !== 'Customer') {
            document.getElementById('customerInfo').style.display = 'block';
            document.getElementById('customerName').textContent = customerName;
        }
        
        document.getElementById('bookingInfo').style.display = 'block';
        
        // Simulate processing and redirect after delay
        setTimeout(() => {
            // Update step 2 to completed
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step2').classList.add('completed');
            document.getElementById('step2').innerHTML = '<i class="bi bi-check"></i>';
            document.querySelector('.status-steps .step-label:nth-child(2)').classList.remove('active');
            document.querySelector('.status-steps .step-label:nth-child(2)').classList.add('completed');
            
            // Update step 3 to active
            document.getElementById('step3').classList.add('active');
            document.querySelector('.status-steps .step-label:nth-child(3)').classList.add('active');
            
            // Update progress
            document.querySelector('.progress-text').textContent = 'Refund completed successfully!';
            
            // Show success and redirect after delay
            setTimeout(() => {
                // Redirect to photographer dashboard
                window.location.href = 'photographer-dashboard.html';
            }, 3000);
        }, 5000);
    </script>
</body>
</html>
