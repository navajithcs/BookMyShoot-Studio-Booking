<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packages — BookMyShoot</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root{--primary:#6366f1;--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--bg:#0b1224;--text:#e5e7eb;--muted:#9ca3af;--card:rgba(255,255,255,0.08);--stroke:rgba(255,255,255,0.14);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at 20% 20%,rgba(99,102,241,0.18),transparent 32%),var(--bg);color:var(--text);min-height:100vh;}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:rgba(8,12,24,0.75);backdrop-filter:blur(14px);border-bottom:1px solid var(--stroke);position:sticky;top:0;z-index:10;}
    .topbar h1{font-size:1.3rem;}
    .btn{padding:10px 18px;border-radius:10px;border:1px solid var(--stroke);background:var(--card);color:var(--text);font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
    .btn:hover{transform:translateY(-2px);}
    .btn.primary{border-color:rgba(99,102,241,0.5);color:#c7d2fe;}
    .btn.success{border-color:rgba(34,197,94,0.5);color:#bbf7d0;}
    .btn.danger{border-color:rgba(239,68,68,0.5);color:#fca5a5;}
    .content{max-width:900px;margin:30px auto;padding:0 20px;}
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:16px;padding:22px;transition:.2s;}
    .card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,0.3);}
    .card .name{font-size:1.1rem;font-weight:700;margin-bottom:4px;}
    .card .desc{color:var(--muted);font-size:0.85rem;margin-bottom:12px;min-height:36px;}
    .card .price{font-size:1.6rem;font-weight:700;color:#a5b4fc;margin-bottom:12px;}
    .card .category{display:inline-block;padding:4px 10px;border-radius:999px;font-size:0.75rem;font-weight:700;background:rgba(99,102,241,0.18);color:#a5b4fc;margin-bottom:12px;}
    .card-actions{display:flex;gap:8px;}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty i{font-size:3rem;display:block;margin-bottom:12px;}
    .layout{display:grid;grid-template-columns:250px 1fr;min-height:100vh;}
    .sidebar{position:sticky;top:0;height:100vh;padding:20px 16px;background:rgba(8,12,24,0.85);border-right:1px solid var(--stroke);backdrop-filter:blur(16px);overflow-y:auto;}
    .sidebar .logo{font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:8px;margin-bottom:22px;}
    .sidebar .logo span{color:var(--muted);font-weight:500;font-size:0.8rem;display:block;}
    .sidebar .nav{list-style:none;padding:0;margin:0;display:grid;gap:6px;}
    .sidebar .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text);border:1px solid transparent;transition:all .25s ease;text-decoration:none;font-size:0.9rem;}
    .sidebar .nav a:hover{background:rgba(255,255,255,0.05);border-color:var(--stroke);}
    .sidebar .nav a.active{background:rgba(99,102,241,0.16);border-color:rgba(99,102,241,0.3);color:#c7d2fe;}
    .sidebar .nav a .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);opacity:0;transition:.2s;}
    .sidebar .nav a.active .dot{opacity:1;}
    .sidebar .slogout{margin-top:20px;width:100%;border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.12);color:#fecdd3;padding:10px;border-radius:10px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;font-size:0.9rem;}
    .sidebar .slogout:hover{background:rgba(239,68,68,0.2);}
    .toggle-sb{display:none;background:var(--card);border:1px solid var(--stroke);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:1.2rem;}
    @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{position:fixed;left:-280px;width:250px;transition:transform .3s ease;z-index:30;}.sidebar.show{transform:translateX(280px);}.toggle-sb{display:inline-flex;align-items:center;justify-content:center;}}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="logo">📸 BookMyShoot <span>Photographer</span></div>
    <ul class="nav">
      <li><a href="photographer-dashboard.html"><span class="dot"></span><i class="bi bi-grid-3x3-gap"></i> Dashboard</a></li>
      <li><a href="photographer-requests.html"><span class="dot"></span><i class="bi bi-chat-dots"></i> Requests</a></li>
      <li><a href="photographer-sessions.html"><span class="dot"></span><i class="bi bi-calendar-check"></i> Sessions</a></li>
      <li><a class="active" href="photographer-packages.html"><span class="dot"></span><i class="bi bi-box"></i> Packages</a></li>
      <li><a href="photographer-earnings.html"><span class="dot"></span><i class="bi bi-wallet2"></i> Earnings</a></li>
      <li><a href="photographer-portfolio.html"><span class="dot"></span><i class="bi bi-images"></i> Portfolio</a></li>
      <li><a href="photographer-profile.html"><span class="dot"></span><i class="bi bi-person-circle"></i> Profile</a></li>
    </ul>
    <button class="slogout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </aside>
  <div class="main-area">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px"><button class="toggle-sb" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button><h1><i class="bi bi-box"></i> My Packages</h1></div>
  </div>
  <div class="content">
    <div class="toolbar">
      <span style="color:var(--muted);font-size:0.9rem;" id="pkgCount">0 packages</span>
      <button class="btn success" onclick="openCreateModal()"><i class="bi bi-plus-circle"></i> New Package</button>
    </div>
    <div class="grid" id="packagesGrid">
      <div class="empty"><i class="bi bi-hourglass-split"></i> Loading...</div>
    </div>
  </div>
  </div><!-- /main-area -->
</div><!-- /layout -->

  <script>
    const API = 'http://localhost:5000/api';
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || !user.photographer_id) { window.location.href = 'login.html'; }
    function logout() { fetch(`${API}/logout`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:user.id}) }).finally(() => { localStorage.removeItem('user'); window.location.href='index.html'; }); }
    const pid = user.photographer_id;

    async function loadPackages() {
      try {
        const res = await fetch(`${API}/packages/photographer/${pid}`);
        const data = await res.json();
        const pkgs = data.packages || [];
        document.getElementById('pkgCount').textContent = pkgs.length + ' package' + (pkgs.length !== 1 ? 's' : '');
        const grid = document.getElementById('packagesGrid');
        if (!pkgs.length) {
          grid.innerHTML = '<div class="empty"><i class="bi bi-box"></i><br>No packages yet.<br>Create your first package to attract customers!</div>';
          return;
        }
        grid.innerHTML = pkgs.map(p => `
          <div class="card">
            <div class="name">${p.name}</div>
            <div class="category">${p.category_name || 'General'}</div>
            <div class="desc">${p.description || 'No description'}</div>
            <div class="price">₹${Number(p.price).toLocaleString('en-IN')}</div>
            <div class="card-actions">
              <button class="btn primary" onclick="openEditModal(${p.id}, '${esc(p.name)}', '${esc(p.description||'')}', ${p.price})"><i class="bi bi-pencil"></i> Edit</button>
              <button class="btn danger" onclick="deletePackage(${p.id})"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    async function openCreateModal() {
      const { value: formValues } = await Swal.fire({
        title: 'Create Package',
        html: `
          <input id="swal-name" class="swal2-input" placeholder="Package Name" style="margin-bottom:8px;">
          <input id="swal-price" class="swal2-input" type="number" placeholder="Price (₹)" min="0" style="margin-bottom:8px;">
          <textarea id="swal-desc" class="swal2-textarea" placeholder="Description (optional)" style="margin-bottom:8px;"></textarea>
        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Create',
        preConfirm: () => {
          const name = document.getElementById('swal-name').value.trim();
          const price = document.getElementById('swal-price').value;
          if (!name || !price) { Swal.showValidationMessage('Name and price are required'); return false; }
          return { name, price: parseFloat(price), description: document.getElementById('swal-desc').value.trim() };
        }
      });
      if (!formValues) return;
      try {
        const res = await fetch(`${API}/packages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photographer_id: pid, ...formValues })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        Swal.fire({ icon: 'success', title: 'Created!', timer: 1200, showConfirmButton: false });
        loadPackages();
      } catch (err) {
        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
      }
    }

    async function openEditModal(id, name, desc, price) {
      const { value: formValues } = await Swal.fire({
        title: 'Edit Package',
        html: `
          <input id="swal-name" class="swal2-input" value="${name}" style="margin-bottom:8px;">
          <input id="swal-price" class="swal2-input" type="number" value="${price}" min="0" style="margin-bottom:8px;">
          <textarea id="swal-desc" class="swal2-textarea" style="margin-bottom:8px;">${desc}</textarea>
        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Save',
        preConfirm: () => {
          const n = document.getElementById('swal-name').value.trim();
          const p = document.getElementById('swal-price').value;
          if (!n || !p) { Swal.showValidationMessage('Name and price are required'); return false; }
          return { name: n, price: parseFloat(p), description: document.getElementById('swal-desc').value.trim() };
        }
      });
      if (!formValues) return;
      try {
        const res = await fetch(`${API}/packages/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formValues)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        Swal.fire({ icon: 'success', title: 'Updated!', timer: 1200, showConfirmButton: false });
        loadPackages();
      } catch (err) {
        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
      }
    }

    async function deletePackage(id) {
      const result = await Swal.fire({ title: 'Delete this package?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Delete', confirmButtonColor: '#ef4444' });
      if (!result.isConfirmed) return;
      try {
        const res = await fetch(`${API}/packages/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        Swal.fire({ icon: 'success', title: 'Deleted', timer: 1100, showConfirmButton: false });
        loadPackages();
      } catch (err) {
        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
      }
    }

    loadPackages();
  </script>
</body>
</html>
